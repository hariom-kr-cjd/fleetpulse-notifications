ktor {
    deployment {
        port = 3001
        port = ${?NOTIFICATION_PORT}
    }
    application {
        modules = [com.fleetpulse.notifications.ApplicationKt.module]
    }
}

mongo {
    uri = "mongodb://localhost:27017/fleetpulse"
    uri = ${?MONGO_URI}
}

auth {
    jwt_secret = "default-secret"
    jwt_secret = ${?JWT_SECRET}
    internal_api_key = "default-key"
    internal_api_key = ${?INTERNAL_API_KEY}
}

cors {
    allowed_origins = "http://localhost:4200"
    allowed_origins = ${?ALLOWED_ORIGINS}
}
